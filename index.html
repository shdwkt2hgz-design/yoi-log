<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>虚星宵 - Personal Log Viewer (HUD)</title>
    <style>

        @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap');

:root {
    --bg-deep: #020617;
        
        :root {
            --bg-deep: #020617;
            --accent-cyan: #38bdf8;
            --accent-purple: #a855f7;
            --accent-gold: #fbbf24;
            --accent-glow: rgba(56, 189, 248, 0.3);
            --purple-glow: rgba(168, 85, 247, 0.4);
            --gold-glow: rgba(251, 191, 36, 0.4);
            --text-main: #f8fafc;
            --window-bg: rgba(56, 189, 248, 0.05);
        }

        /* --- 1. スクロールバーのカスタマイズ --- */
/* バー全体の幅 */
::-webkit-scrollbar {
    width: 6px;
}
/* 背景（レール）部分 */
::-webkit-scrollbar-track {
    background: rgba(2, 6, 23, 0.5);
}
/* 動く棒の部分 */
::-webkit-scrollbar-thumb {
    background: var(--accent-cyan);
    border-radius: 3px;
    box-shadow: 0 0 10px var(--accent-glow);
}

/* --- 2. フォントの導入（Google Fonts） --- */
/* 英数字にSF感のある 'Share Tech Mono' を適用 */
@import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap');

body {
    /* フォント指定の先頭に追加 */
    font-family: 'Share Tech Mono', -apple-system, "Hiragino Sans", "Meiryo", sans-serif;
}

    body {
    margin: 0; padding: 0; 
    color: var(--text-main);
    /* 'Share Tech Mono' を一番左に持ってくる */
    font-family: 'Share Tech Mono', monospace, -apple-system, "Hiragino Sans", "Meiryo", sans-serif;
    min-height: 100vh;
}

/* --- 3. ログ表示のアニメーション --- */
@keyframes logAppear {
    from {
        opacity: 0;
        transform: translateY(20px) scale(0.98);
        filter: blur(10px);
    }
    to {
        opacity: 1;
        transform: translateY(0) scale(1);
        filter: blur(0);
    }
}

.log-window {
    /* 既存のプロパティはそのままで、以下を追加 */
    animation: logAppear 0.6s cubic-bezier(0.22, 1, 0.36, 1) backwards;
}
        
        /* --- 【重要】背景を完全に固定するレイヤー --- */
        #fixed-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1; /* コンテンツの背面に配置 */
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-color: var(--bg-deep);
            /* スマホでのカクつき防止 */
            transform: translateZ(0);
            transition: background-image 1.5s ease;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: transparent; /* 背景はfixed-bgに任せる */
            color: var(--text-main);
            font-family: -apple-system, "Hiragino Sans", "Meiryo", sans-serif;
            min-height: 100vh;
            /* bodyでの背景設定は全て削除して競合を防ぐ */
        }

        .container { padding: 40px 20px 140px; max-width: 500px; margin: 0 auto; }
        .header-title { text-align: center; font-size: 0.8rem; letter-spacing: 0.3em; color: var(--accent-cyan); margin-bottom: 40px; text-transform: uppercase; }

        .log-window {
            position: relative; background: var(--window-bg); border: 1px solid rgba(56, 189, 248, 0.2);
            padding: 10px 15px; margin-bottom: 15px; backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
        }
        .log-window::before { content: ""; position: absolute; top: -1px; left: -1px; width: 15px; height: 15px; border-top: 2px solid var(--accent-cyan); border-left: 2px solid var(--accent-cyan); }
        .log-window::after { content: ""; position: absolute; bottom: -1px; right: -1px; width: 15px; height: 15px; border-bottom: 2px solid var(--accent-cyan); border-right: 2px solid var(--accent-cyan); }
        
        .log-meta { font-family: monospace; font-size: 0.7rem; opacity: 0.8; margin-bottom: 4px; display: flex; justify-content: space-between; }
        .log-text { font-size: 13px; line-height: 1.6; word-wrap: break-word; min-height: 3em; color: var(--text-main); }
        .log-footer { margin-top: 4px; display: flex; justify-content: space-between; align-items: center; }
        
        .star-btn { background: none; border: none; color: #475569; font-size: 1.2rem; cursor: pointer; transition: color 0.3s; }
        .star-btn.active { color: var(--accent-gold); }
        .hashtags { font-size: 11px; color: var(--accent-cyan); opacity: 0.7; }
        .timestamp-top { font-family: monospace; font-size: 10px; opacity: 0.5; }

        .hud-system { position: fixed; bottom: 40px; right: 20px; z-index: 2000; text-align: right; }
        .fav-toggle-btn {
            display: inline-block; width: 40px; height: 40px; margin-bottom: 10px;
            border-radius: 4px; background: rgba(2, 6, 23, 0.9); border: 1px solid var(--accent-cyan);
            color: var(--accent-cyan); font-size: 20px; cursor: pointer;
            backdrop-filter: blur(4px); transition: all 0.4s; box-shadow: 0 0 10px var(--accent-glow);
            line-height: 40px; padding: 0;
        }
        .fav-toggle-btn.active { border-color: var(--accent-gold); color: var(--accent-gold); box-shadow: 0 0 15px var(--gold-glow); transform: scale(1.1); }
        .mode-btn {
            width: 60px; height: 60px; border-radius: 50%;
            background: rgba(2, 6, 23, 0.9); border: 2px solid var(--accent-cyan);
            color: var(--accent-cyan); cursor: pointer; position: relative;
            box-shadow: 0 0 20px var(--accent-glow); backdrop-filter: blur(8px);
            display: flex; align-items: center; justify-content: center;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .current-mode-display { position: absolute; top: 68px; left: 50%; transform: translateX(-50%); font-family: monospace; font-size: 10px; color: var(--accent-cyan); text-shadow: 0 0 8px var(--accent-glow); white-space: nowrap; opacity: 0.9; }
    </style>
</head>
<body> 
    <div id="fixed-bg"></div>

    <div class="container">
        <div class="header-title">Ryusei Yoi / Personal Log Viewer (HUD)</div>
        <div id="auth-section" class="log-window" style="text-align: center; padding: 30px 10px;">
            <div id="login-status">読み込み中...</div>
            <button id="login-btn" style="display:none; margin: 20px auto; padding: 12px 24px; background: var(--accent-cyan); color: var(--bg-deep); border: none; border-radius: 4px; font-weight: bold; cursor: pointer;">Googleログイン</button>
        </div>
        <div id="log-container" style="display:none;"></div>
    </div>

    <div class="hud-system" id="hud-ui" style="display:none;">
        <div><button class="fav-toggle-btn" id="fav-filter-btn" onclick="toggleFavMode()">★</button></div>
        <button class="mode-btn" onclick="toggleNextMode()">
            <div style="font-size: 24px;">🛰️</div>
            <div class="current-mode-display" id="mode-display">MODE: ALL</div>
        </button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-app.js";
        import { getAuth, GoogleAuthProvider, signInWithPopup, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-auth.js";
        import { getDatabase, ref, onValue, get } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-database.js";

        const firebaseConfig = {
            databaseURL: "https://yoi-log-default-rtdb.firebaseio.com", 
            apiKey: "AIzaSyBgUBe80kRzgyqbmQgWQaP070RzfWw3NDQ",
            authDomain: "yoi-log.firebaseapp.com",
            projectId: "yoi-log",
            storageBucket: "yoi-log.firebasestorage.app",
            messagingSenderId: "248106619066",
            appId: "1:248106619066:web:12aab65565d7d7292df283",
            measurementId: "G-W7Y12M3YMB"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);

        let allLogs = []; 
        let currentFilter = 'ALL';
        let isFavOnly = false;
        const modes = ['ALL', '#思ったこと', '#聴いた曲', '#ゲーム'];

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                document.getElementById('login-status').innerText = `観測中: ${user.displayName}`;
                document.getElementById('login-btn').style.display = "none";
                checkPermissionAndLoadLogs(user.uid);
            } else {
                document.getElementById('login-btn').style.display = "block";
            }
        });

        document.getElementById('login-btn').onclick = () => {
            signInWithPopup(auth, new GoogleAuthProvider()).catch(err => console.error(err));
        };

        async function checkPermissionAndLoadLogs(uid) {
            const snapshot = await get(ref(db, 'whitelist/' + uid));
            if (snapshot.exists() && snapshot.val() === true) {
                document.getElementById('auth-section').style.display = "none";
                document.getElementById('log-container').style.display = "block";
                document.getElementById('hud-ui').style.display = "block";
                onValue(ref(db, 'logs'), (logSnapshot) => {
                    const data = logSnapshot.val();
                    if (data) {
                        allLogs = Object.keys(data).map(key => data[key]);
                        allLogs.sort((a, b) => new Date(b.date.replace(/\./g, '/')) - new Date(a.date.replace(/\./g, '/')));
                        renderLogs();
                    }
                });
            }
        }

        function renderLogs() {
            const container = document.getElementById('log-container');
            const favorites = JSON.parse(localStorage.getItem('yoi_favs') || '[]');
            let filtered = allLogs;
            if (isFavOnly) filtered = filtered.filter(log => favorites.includes(log.date));
            if (currentFilter !== 'ALL') filtered = filtered.filter(log => log.tags && log.tags.includes(currentFilter));

            container.innerHTML = filtered.map(log => `
                <div class="log-window">
                    <div class="log-meta"><span class="timestamp-top">${log.date}</span></div>
                    <div class="log-text">${log.text}</div>
                    <div class="log-footer">
                        <span class="hashtags">${log.tags || ''}</span>
                        <button class="star-btn ${favorites.includes(log.date) ? 'active' : ''}" onclick="favLog(this, '${log.date}')">★</button>
                    </div>
                </div>
            `).join('');
        }

        window.toggleNextMode = function() {
            let idx = modes.indexOf(currentFilter);
            idx = (idx + 1) % modes.length;
            currentFilter = modes[idx];
            document.getElementById('mode-display').innerText = `MODE: ${currentFilter}`;
            renderLogs();
        };

        window.toggleFavMode = function() {
            isFavOnly = !isFavOnly;
            document.getElementById('fav-filter-btn').classList.toggle('active');
            renderLogs();
        };

        function updateBackground() {
            const hour = new Date().getHours();
            let bg = (hour >= 6 && hour < 12) ? "morning.jpg" : 
                     (hour >= 12 && hour < 17) ? "noon.jpg" : 
                     (hour >= 17 && hour < 20) ? "evening.jpg" : "night.jpg";
            
            const bgElement = document.getElementById('fixed-bg');
            if(bgElement) {
                bgElement.style.backgroundImage = `url('${bg}')`;
            }
        }
        updateBackground();
        setInterval(updateBackground, 60000);

        window.favLog = function(btn, logId) {
            btn.classList.toggle('active');
            let favs = JSON.parse(localStorage.getItem('yoi_favs') || '[]');
            if (btn.classList.contains('active')) { if (!favs.includes(logId)) favs.push(logId); }
            else { favs = favs.filter(id => id !== logId); }
            localStorage.setItem('yoi_favs', JSON.stringify(favs));
            if (isFavOnly) renderLogs();
        };
    </script>
</body>
</html>
