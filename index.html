<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>虚星宵 - Personal Log Viewer (HUD)</title>
    <style>
        /* 1. フォント読み込み */
        @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Zen+Kaku+Gothic+New:wght@400;700&display=swap');
        
        /* 2. 変数設定 */
        :root {
            --bg-deep: #020617;
            --accent-cyan: #38bdf8;
            --accent-purple: #a855f7;
            --accent-gold: #fbbf24;
            --accent-glow: rgba(56, 189, 248, 0.3);
            --text-main: #f8fafc;
            --window-bg: rgba(56, 189, 248, 0.05);
        }

        /* 3. スクロールバー */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: rgba(2, 6, 23, 0.5); }
        ::-webkit-scrollbar-thumb { 
            background: var(--accent-cyan); 
            border-radius: 3px; 
            box-shadow: 0 0 10px var(--accent-glow); 
        }

        @keyframes logAppear {
            from { opacity: 0; transform: translateY(20px) scale(0.98); filter: blur(10px); }
            to { opacity: 1; transform: translateY(0) scale(1); filter: blur(0); }
        }

        body {
            margin: 0; padding: 0; 
            background-color: transparent;
            color: var(--text-main);
            font-family: 'Share Tech Mono', 'Zen Kaku Gothic New', sans-serif;
            min-height: 100vh;
        }

        #fixed-bg {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1; background-size: cover; background-position: center;
            background-repeat: no-repeat; background-color: var(--bg-deep);
            transform: translateZ(0); transition: background-image 1.5s ease;
        }

        .container { padding: 40px 20px 140px; max-width: 500px; margin: 0 auto; }
        .header-title { 
            text-align: center; font-size: 0.8rem; letter-spacing: 0.3em; 
            color: var(--accent-cyan); margin-bottom: 40px; text-transform: uppercase; 
        }

        .log-window {
            position: relative; background: var(--window-bg); border: 1px solid rgba(56, 189, 248, 0.2);
            padding: 10px 15px; margin-bottom: 15px; backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
            animation: logAppear 0.6s cubic-bezier(0.22, 1, 0.36, 1) backwards;
        }
        
        .log-window::before { content: ""; position: absolute; top: -1px; left: -1px; width: 15px; height: 15px; border-top: 2px solid var(--accent-cyan); border-left: 2px solid var(--accent-cyan); }
        .log-window::after { content: ""; position: absolute; bottom: -1px; right: -1px; width: 15px; height: 15px; border-bottom: 2px solid var(--accent-cyan); border-right: 2px solid var(--accent-cyan); }
        
        .log-meta { font-family: 'Share Tech Mono', monospace; font-size: 0.7rem; opacity: 0.8; margin-bottom: 4px; display: flex; justify-content: space-between; }
        .log-text { font-size: 13px; line-height: 1.6; word-wrap: break-word; min-height: 3em; color: var(--text-main); }
        .log-footer { margin-top: 4px; display: flex; justify-content: space-between; align-items: center; }
        
        .star-btn { background: none; border: none; color: #475569; font-size: 1.2rem; cursor: pointer; transition: color 0.3s; }
        .star-btn.active { color: var(--accent-gold); }
        .hashtags { font-size: 11px; color: var(--accent-cyan); opacity: 0.7; }
        .timestamp-top { font-family: 'Share Tech Mono', monospace; font-size: 10px; opacity: 0.5; }

        /* HUD & アーカイブパネル */
        .hud-system { position: fixed; bottom: 40px; right: 20px; z-index: 2000; text-align: right; }
        .fav-toggle-btn {
            display: inline-block; width: 40px; height: 40px; margin-bottom: 10px;
            border-radius: 4px; background: rgba(2, 6, 23, 0.9); border: 1px solid var(--accent-cyan);
            color: var(--accent-cyan); font-size: 20px; cursor: pointer;
            backdrop-filter: blur(4px); transition: all 0.4s; box-shadow: 0 0 10px var(--accent-glow);
            line-height: 40px; padding: 0;
        }
        .fav-toggle-btn.active { border-color: var(--accent-gold); color: var(--accent-gold); box-shadow: 0 0 15px var(--gold-glow); transform: scale(1.1); }
        
        .mode-btn {
            width: 60px; height: 60px; border-radius: 50%;
            background: rgba(2, 6, 23, 0.9); border: 2px solid var(--accent-cyan);
            color: var(--accent-cyan); cursor: pointer; position: relative;
            box-shadow: 0 0 20px var(--accent-glow); backdrop-filter: blur(8px);
            display: flex; align-items: center; justify-content: center;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .current-mode-display { 
            position: absolute; top: 68px; left: 50%; transform: translateX(-50%); 
            font-family: 'Share Tech Mono', monospace; font-size: 10px; 
            color: var(--accent-cyan); text-shadow: 0 0 8px var(--accent-glow); 
            white-space: nowrap; background: rgba(2, 6, 23, 0.85);
            border: 1px solid var(--accent-cyan); padding: 2px 10px; border-radius: 2px;
            box-shadow: 0 0 10px var(--accent-glow); backdrop-filter: blur(4px);
        }

        /* アーカイブパネル */
        #archive-panel {
            position: fixed; top: 0; right: -320px; width: 280px; height: 100%; 
            z-index: 2500; transition: 0.5s cubic-bezier(0.16, 1, 0.3, 1); 
            padding: 60px 15px; background: rgba(2, 6, 23, 0.95);
            border-left: 1px solid var(--accent-cyan); backdrop-filter: blur(10px);
        }
        .calendar-grid {
            display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; margin-top: 15px;
        }
        .calendar-day-head {
            font-size: 10px; color: var(--accent-cyan); opacity: 0.5; text-align: center;
        }
        .calendar-day {
            aspect-ratio: 1; display: flex; align-items: center; justify-content: center;
            font-size: 11px; font-family: 'Share Tech Mono';
            border: 1px solid rgba(56, 189, 248, 0.1); color: #475569; border-radius: 2px;
        }
        .calendar-day.has-log {
            border-color: var(--accent-cyan); color: var(--accent-cyan);
            cursor: pointer; background: rgba(56, 189, 248, 0.1);
            box-shadow: inset 0 0 5px var(--accent-glow);
        }
        .calendar-day.has-log:hover { background: var(--accent-cyan); color: var(--bg-deep); }

        #loading-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg-deep); z-index: 3000; display: flex;
            flex-direction: column; align-items: center; justify-content: center;
            transition: opacity 0.8s ease;
        }
        .scan-line {
            width: 200px; height: 2px; background: var(--accent-cyan);
            box-shadow: 0 0 15px var(--accent-cyan); position: relative;
            overflow: hidden; margin-bottom: 20px;
        }
        .scan-line::after {
            content: ""; display: block; width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, #fff, transparent);
            animation: scanning-bar 1.5s infinite;
        }
        @keyframes scanning-bar { 0% { transform: translateX(-100%); } 100% { transform: translateX(100%); } }
    </style>
</head>
<body> 
    <div id="loading-overlay">
        <div class="scan-line"></div>
        <div style="font-family: 'Share Tech Mono'; color: var(--accent-cyan); letter-spacing: 5px; font-size: 12px;">SYSTEM INITIALIZING...</div>
    </div>
    <div id="fixed-bg"></div>

    <div class="container">
        <div class="header-title">Ryusei Yoi / Personal Log Viewer (HUD)</div>
        
        <div id="user-info-panel" style="display:none; text-align: center; margin-bottom: 20px;">
            <div style="font-size: 10px; opacity: 0.6; letter-spacing: 1px;">CONNECT ID</div>
            <div id="uid-display" onclick="copyUID()" style="display: inline-block; padding: 8px 15px; background: rgba(56, 189, 248, 0.1); border: 1px dashed var(--accent-cyan); color: var(--accent-cyan); font-family: 'Share Tech Mono'; font-size: 14px; cursor: pointer; border-radius: 4px; margin-top: 5px;">
                IDを取得中...
            </div>
            <div id="copy-msg" style="font-size: 9px; color: var(--accent-gold); height: 12px; margin-top: 4px; opacity: 0;">COPIED!</div>
        </div>

        <div id="auth-section" class="log-window" style="text-align: center; padding: 30px 10px;">
            <div id="login-status">読み込み中...</div>
            <button id="login-btn" style="display:none; margin: 20px auto; padding: 12px 24px; background: var(--accent-cyan); color: var(--bg-deep); border: none; border-radius: 4px; font-weight: bold; cursor: pointer;">Googleログイン</button>
        </div>
        
        <div id="log-container" style="display:none;"></div>
    </div>

    <div class="hud-system" id="hud-ui" style="display:none;">
        <div><button class="fav-toggle-btn" id="calendar-btn" onclick="toggleArchive()">📅</button></div>
        <div><button class="fav-toggle-btn" id="fav-filter-btn" onclick="toggleFavMode()">★</button></div>
        <button class="mode-btn" onclick="toggleNextMode()">
            <div style="font-size: 24px;">🛰️</div>
            <div class="current-mode-display" id="mode-display">MODE: ALL</div>
        </button>
    </div>

   <div id="archive-panel" class="log-window">
        <div style="color:var(--accent-cyan); font-size:12px; margin-bottom:20px; border-bottom:1px solid var(--accent-cyan); font-family:'Share Tech Mono';">DATA ARCHIVE</div>
        <div id="archive-list"></div>
        <button onclick="resetToAll()" style="margin-top:30px; background:rgba(56, 189, 248, 0.1); border:1px solid var(--accent-cyan); color:var(--accent-cyan); width:100%; cursor:pointer; padding: 10px; font-family:'Share Tech Mono'; font-size:11px;">SHOW ALL LOGS</button>
        <button onclick="toggleArchive()" style="margin-top:10px; background:none; border:1px solid rgba(255,255,255,0.2); color:rgba(255,255,255,0.5); width:100%; cursor:pointer; padding: 10px; font-family:'Share Tech Mono'; font-size:11px;">CLOSE</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-app.js";
        import { getAuth, GoogleAuthProvider, signInWithPopup, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-auth.js";
        import { getDatabase, ref, onValue, get } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-database.js";

        const firebaseConfig = {
            databaseURL: "https://yoi-log-default-rtdb.firebaseio.com", 
            apiKey: "AIzaSyBgUBe80kRzgyqbmQgWQaP070RzfWw3NDQ",
            authDomain: "yoi-log.firebaseapp.com",
            projectId: "yoi-log",
            storageBucket: "yoi-log.firebasestorage.app",
            messagingSenderId: "248106619066",
            appId: "1:248106619066:web:12aab65565d7d7292df283",
            measurementId: "G-W7Y12M3YMB"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);

        let allLogs = []; 
        let currentFilter = 'ALL';
        let isFavOnly = false;
        const modes = ['ALL', '#思ったこと', '#聴いた曲', '#ゲーム'];

        onAuthStateChanged(auth, async (user) => {
            const infoPanel = document.getElementById('user-info-panel');
            const uidDisplay = document.getElementById('uid-display');
            
            if (user) {
                uidDisplay.innerText = user.uid;
                infoPanel.style.display = "block";
                document.getElementById('login-status').innerText = `観測中: ${user.displayName}`;
                document.getElementById('login-btn').style.display = "none";
                checkPermissionAndLoadLogs(user.uid);
            } else {
                infoPanel.style.display = "none";
                document.getElementById('login-status').innerText = "閲覧には認証が必要です";
                document.getElementById('login-btn').style.display = "block";
            }
        });

        window.copyUID = function() {
            const uidText = document.getElementById('uid-display').innerText;
            navigator.clipboard.writeText(uidText).then(() => {
                const msg = document.getElementById('copy-msg');
                msg.style.opacity = "1";
                setTimeout(() => { msg.style.opacity = "0"; }, 2000);
            });
        };

        let isFirstLoad = true;
        function hideLoading() {
            if (!isFirstLoad) return;
            isFirstLoad = false;
            const overlay = document.getElementById('loading-overlay');
            if(overlay) {
                overlay.style.opacity = '0';
                setTimeout(() => { overlay.style.display = 'none'; }, 800);
            }
        }

        document.getElementById('login-btn').onclick = () => {
            signInWithPopup(auth, new GoogleAuthProvider()).catch(err => console.error(err));
        };

        async function checkPermissionAndLoadLogs(uid) {
            // --- [設定部] ---
            const ADMIN_UID = "TEST_MODE"; 
            const GAS_URL = "https://script.google.com/macros/s/AKfycbztCfEZy9Mggprm9j5-WQQdVidMSeGEEY4e__pkMkXwSJqkT31ao8yxLZlBXHhbrbVZ/exec";
            // ----------------

            if (uid === ADMIN_UID) {
                console.log("ADMIN ACCESS GRANTED");
                setupLogListener();
                return;
            }

            try {
                document.getElementById('login-status').innerText = "会員権限を確認中...";
                const response = await fetch(`${GAS_URL}?uid=${uid}`);
                const result = await response.json();

                if (result.allowed) {
                    setupLogListener();
                } else {
                    hideLoading();
                    document.getElementById('login-status').innerHTML = 
                        `未登録のIDです<br><span style="font-size:10px; color:var(--accent-gold);">UIDを管理者に伝えてください</span>`;
                }
            } catch (error) {
                console.error("GAS Auth Error:", error);
                document.getElementById('login-status').innerText = "認証サーバー接続エラー";
                hideLoading();
            }
        }

        function setupLogListener() {
            document.getElementById('auth-section').style.display = "none";
            document.getElementById('log-container').style.display = "block";
            document.getElementById('hud-ui').style.display = "block";
            
            onValue(ref(db, 'logs'), (logSnapshot) => {
                const data = logSnapshot.val();
                if (data) {
                    allLogs = Object.keys(data).map(key => data[key]);
                    allLogs.sort((a, b) => new Date(b.date.replace(/\./g, '/')) - new Date(a.date.replace(/\./g, '/')));
                    renderLogs();
                }
            });
        }

        function renderLogs() {
            const container = document.getElementById('log-container');
            const favorites = JSON.parse(localStorage.getItem('yoi_favs') || '[]');
            let filtered = allLogs;
            if (isFavOnly) filtered = filtered.filter(log => favorites.includes(log.date));
            if (currentFilter !== 'ALL') filtered = filtered.filter(log => log.tags && log.tags.includes(currentFilter));

            container.innerHTML = filtered.map(log => `
                <div class="log-window">
                    <div class="log-meta"><span class="timestamp-top">${log.date}</span></div>
                    <div class="log-text">${log.text}</div>
                    <div class="log-footer">
                        <span class="hashtags">${log.tags || ''}</span>
                        <button class="star-btn ${favorites.includes(log.date) ? 'active' : ''}" onclick="favLog(this, '${log.date}')">★</button>
                    </div>
                </div>
            `).join('');
            hideLoading();
        }

        window.toggleArchive = function() {
            const panel = document.getElementById('archive-panel');
            const isArchiveOpen = panel.style.right === "0px";
            panel.style.right = isArchiveOpen ? "-320px" : "0px";
            if(!isArchiveOpen) generateArchiveList();
        };

        function generateArchiveList() {
            const listContainer = document.getElementById('archive-list');
            const now = new Date();
            const year = now.getFullYear();
            const month = now.getMonth();
            const firstDay = new Date(year, month, 1).getDay();
            const daysInMonth = new Date(year, month + 1, 0).getDate();

            let html = `<div style="text-align:center; color:var(--accent-cyan); font-family:'Share Tech Mono'; margin-bottom:10px;">${year} / ${month + 1}</div>`;
            html += `<div class="calendar-grid">`;
            ['S','M','T','W','T','F','S'].forEach(d => html += `<div class="calendar-day-head">${d}</div>`);
            for(let i=0; i<firstDay; i++) html += `<div class="calendar-day"></div>`;
            for(let d=1; d<=daysInMonth; d++) {
                const dateStr = `${year}.${String(month+1).padStart(2,'0')}.${String(d).padStart(2,'0')}`;
                const hasLog = allLogs.some(log => log.date.includes(dateStr));
                const className = hasLog ? "calendar-day has-log" : "calendar-day";
                const onclick = hasLog ? `onclick="jumpToDate('${dateStr}')"` : "";
                html += `<div class="${className}" ${onclick}>${d}</div>`;
            }
            html += `</div>`;
            listContainer.innerHTML = html;
        }

        window.jumpToDate = function(date) {
            window.toggleArchive();
            const container = document.getElementById('log-container');
            const favorites = JSON.parse(localStorage.getItem('yoi_favs') || '[]');
            const filtered = allLogs.filter(log => log.date.includes(date));
            if (filtered.length === 0) return;

            container.innerHTML = `
                <div style="color:var(--accent-cyan); font-size:10px; margin-bottom:15px; text-align:center; font-family:'Share Tech Mono'; letter-spacing:2px;">
                    -- OBSERVING DATA: ${date} --
                </div>
            ` + filtered.map(log => `
                <div class="log-window">
                    <div class="log-meta"><span class="timestamp-top">${log.date}</span></div>
                    <div class="log-text">${log.text}</div>
                    <div class="log-footer">
                        <span class="hashtags">${log.tags || ''}</span>
                        <button class="star-btn ${favorites.includes(log.date) ? 'active' : ''}" onclick="favLog(this, '${log.date}')">★</button>
                    </div>
                </div>
            `).join('');
            window.scrollTo({ top: 0, behavior: 'smooth' });
        };

        window.resetToAll = function() {
            window.toggleArchive();
            currentFilter = 'ALL';
            document.getElementById('mode-display').innerText = `MODE: ALL`;
            renderLogs();
        };

        window.toggleNextMode = function() {
            let idx = modes.indexOf(currentFilter);
            idx = (idx + 1) % modes.length;
            currentFilter = modes[idx];
            document.getElementById('mode-display').innerText = `MODE: ${currentFilter}`;
            renderLogs();
        };

        window.toggleFavMode = function() {
            isFavOnly = !isFavOnly;
            document.getElementById('fav-filter-btn').classList.toggle('active');
            renderLogs();
        };

        function updateBackground() {
            const hour = new Date().getHours();
            let bg = (hour >= 6 && hour < 12) ? "morning.jpg" : (hour >= 12 && hour < 17) ? "noon.jpg" : (hour >= 17 && hour < 20) ? "evening.jpg" : "night.jpg";
            const bgElement = document.getElementById('fixed-bg');
            if(bgElement) bgElement.style.backgroundImage = `url('${bg}')`;
        }
        updateBackground();
        setInterval(updateBackground, 60000);

        window.favLog = function(btn, logId) {
            let favorites = JSON.parse(localStorage.getItem('yoi_favs') || '[]');
            if (favorites.includes(logId)) {
                favorites = favorites.filter(id => id !== logId);
                btn.classList.remove('active');
            } else {
                favorites.push(logId);
                btn.classList.add('active');
            }
            localStorage.setItem('yoi_favs', JSON.stringify(favorites));
            if (isFavOnly) renderLogs();
        };
    </script>
</body>
</html>
