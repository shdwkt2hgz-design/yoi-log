<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>OBS表示システム</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: transparent;
        }

        /* 埋め込み先のサイト画面 */
        #web-site {
            width: 100%;
            height: 100%;
            border: none;
        }

        /* 引用元テロップ */
        #source-label {
            position: absolute;
            bottom: 20px;
            right: 20px;
            color: #00ffcc;
            background: rgba(0, 0, 0, 0.8);
            padding: 5px 15px;
            font-family: 'Segoe UI', sans-serif;
            border: 2px solid #00ffcc;
            border-radius: 4px;
            font-weight: bold;
            z-index: 999;
        }
    </style>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-database-compat.js"></script>
</head>
<body>

    <iframe id="web-site" src="https://www.google.com/search?q=&igu=1&hl=ja&gl=jp&lr=lang_ja&uule=w+CAIQICIGlobal"></iframe>

    <div id="source-label">引用元を表示中</div>

    <script>
        // --- Firebase設定 ---
        const firebaseConfig = {
            apiKey: "AIzaSyC8ybi5nzlRFV43prUPS_SvQR3Lcu5GP9I",
            authDomain: "innyou-1ec17.firebaseapp.com",
            databaseURL: "https://innyou-1ec17-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "innyou-1ec17",
            storageBucket: "innyou-1ec17.firebasestorage.app",
            messagingSenderId: "434159243576",
            appId: "1:434159243576:web:0a4835114eaa94c2bf71cd",
            measurementId: "G-NS94XL63CH"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // ページを切り替えるメイン関数
function displayTarget(targetInput) {
    const iframe = document.getElementById('web-site');
    const label = document.getElementById('source-label');
    let finalUrl = targetInput;

    // URL(http...)で始まっていない場合は「Google検索」にする！
    if (!targetInput.startsWith('http')) {
        // Googleの検索結果URLの形式に変換
        finalUrl = `https://www.google.com/search?q=${encodeURIComponent(targetInput)}&igu=1&hl=ja&gl=jp&lr=lang_ja&uule=w+CAIQICIJapan`;
    }

    try {
        iframe.src = finalUrl;
        const urlObj = new URL(finalUrl);
        label.innerText = `引用元: ${urlObj.hostname}`;
    } catch (e) {
        label.innerText = "表示エラー";
    }
}

        // PC側の入力欄用
        function changePage() {
            const val = document.getElementById('url-input').value;
            if (val) displayTarget(val);
        }

        // Firebaseを見張る（スマホからの命令をキャッチ）
        db.ref('currentURL').on('value', (snapshot) => {
            const remoteData = snapshot.val();
            if (remoteData) {
                displayTarget(remoteData);
            }
        });

        // 外部サイトはセキュリティ上URL取得が制限されるため、
        // 基本的には displayTarget 実行時のラベル更新を優先します
    </script>
</body>
</html>
