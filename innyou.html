<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden; /* スクロールバーを隠す */
            background-color: transparent; /* 背景を透明に */
        }

        /* 埋め込み先のサイト画面 */
        #web-site {
            width: 100%;
            height: 100%;
            border: none;
        }

        /* 引用元テロップ */
        #source-label {
            position: absolute;
            bottom: 20px;
            right: 20px;
            color: #00ffcc;
            background: rgba(0, 0, 0, 0.8);
            padding: 5px 15px;
            font-family: 'Segoe UI', sans-serif;
            border: 2px solid #00ffcc;
            border-radius: 4px;
            font-weight: bold;
            z-index: 999; /* 一番手前に表示 */
        }
    </style>
<script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-database-compat.js"></script>
</head>
<body>

    <iframe id="web-site" src=""></iframe>
<!-- HTML部分：入力欄とボタン -->
<div id="admin-panel" style="position:fixed; top:10; left:10; z-index:1000; background:white; padding:10px;">
    <input type="text" id="url-input" placeholder="URLやワードを入力">
    <button onclick="changePage()">移動</button>
</div>

    <div id="source-label">引用元を表示中</div>

    <script>
function changePage() {
    const val = document.getElementById('url-input').value;
    // もしURLっぽくなければGoogle検索に飛ばす、などの処理も可能
    displayTarget(val); 
}
        function displayTarget(targetUrl) {
            const iframe = document.getElementById('web-site');
            const label = document.getElementById('source-label');

            try {
                // 1. サイトをiframeに読み込む
                iframe.src = targetUrl;

                // 2. URLからドメインを抽出してテロップにする
                const url = new URL(targetUrl);
                label.innerText = `引用元: ${url.hostname}`;
            } catch (e) {
                label.innerText = "URLが正しくありません";
            }
        }
// iframeの中身が切り替わった（ページ移動した）ことを検知する
document.getElementById('web-site').onload = function() {
    try {
        // 移動先のURLを取得してテロップを更新
        const currentUrl = this.contentWindow.location.href;
        const url = new URL(currentUrl);
        document.getElementById('source-label').innerText = `引用元: ${url.hostname}`;
    } catch (e) {
        // 外部サイトの場合はセキュリティ制限でURLが読めないことがあるので
        // その場合は最初に設定したドメインのまま維持されます
    }
};

        // 【テスト】帰宅して開いた瞬間、このサイトが表示されます
        // 実際はここを書き換えたり、スマホから送ったりします
        displayTarget("https://www.wikipedia.org/"); 

  // Firebaseの設定（コンソールで発行されたものに書き換える）
 const firebaseConfig = {
    apiKey: "AIzaSyC8ybi5nzlRFV43prUPS_SvQR3Lcu5GP9I",
    authDomain: "innyou-1ec17.firebaseapp.com",
    databaseURL: "https://innyou-1ec17-default-rtdb.asia-southeast1.firebasedatabase.app",
    projectId: "innyou-1ec17",
    storageBucket: "innyou-1ec17.firebasestorage.app",
    messagingSenderId: "434159243576",
    appId: "1:434159243576:web:0a4835114eaa94c2bf71cd",
    measurementId: "G-NS94XL63CH"
  };
  firebase.initializeApp(firebaseConfig);
  const db = firebase.database();

  // データベースの 'currentURL' という項目を見張る
  db.ref('currentURL').on('value', (snapshot) => {
    const newUrl = snapshot.val();
    if (newUrl) {
      displayTarget(newUrl); // さっき作った表示関数を呼び出す
    }
  });
    </script>
</body>
</html>
